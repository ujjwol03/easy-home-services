<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/image/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
    <link rel="stylesheet" href="adminStaff.css">
    <script src="/config.js"></script>
    <title>Admin Staff</title>
</head>

<body>
    <header class="header">
        <div class="logo-container">
            <img src="/image/logo.png" alt="Logo" class="logo-img">
            <h2>EasyHomeServices</h2>
        </div>
        <div class="staff-box">
            <p>Staff</p>
        </div>
        <div class="user-info">
            <i class="fa fa-user user-icon"></i>
            <span class="username">Admin</span>
        </div>
    </header>

    <div class="content-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="nav">
                <ul>
                    <li><a href="adminDashboard.html" class="menu-item"><i class="fa fa-tachometer-alt icon"></i>
                            Dashboard</a></li>
                    <li><a href="adminUser.html" class="menu-item"><i class="fa fa-users icon"></i>
                            Users</a></li>
                    <li><a href="adminStaff.html" class="menu-item active"><i class="fa fa-user-tie icon"></i> Staff</a>
                    </li>
                    <li><a href="adminCategory.html" class="menu-item"><i class="fa fa-th icon"></i>
                            Categories</a></li>
                    <li><a href="adminService.html" class="menu-item"><i class="fa fa-cogs icon"></i> Services</a></li>
                    <li><a href="adminBookings.html" class="menu-item"><i class="fa-solid fa-bookmark icon"></i>
                            Bookings</a></li>
                    <li><a href="adminPayments.html" class="menu-item"><i class="fa fa-credit-card icon"></i>
                            Payments</a></li>
                    <li><a href="#" id="logout-link" class="menu-item"><i class="fa fa-sign-out-alt icon"></i>
                            Logout</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Staff Table -->
            <div class="table-container">
                <div class="header-row">
                    <div class="search-container">
                        <i class="fa fa-search search-icon"></i>
                        <input type="text" placeholder="Search Staff..." class="search-input">
                    </div>
                    <select id="statusFilter" class="status-filter" style="padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                        <option value="approved">Approved Staff</option>
                        <option value="pending">Pending Requests</option>
                    </select>
                </div>
                <table class="staff-table">
                    <thead>
                        <tr>
                            <th>SN</th>
                            <th>Staff Name</th>
                            <th>Certificate</th>
                            <th>Phone Number</th>
                            <th>Category</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="staffTableBody">
                    </tbody>
                </table>

                <!-- Image when there is no data in table -->
                <div id="noDataRow">
                    <img src="/image/404-error.svg" alt="No Data" style="width: 430px; margin-left: 32%;" />
                    <p style="font-weight: bold; font-size: 16px; text-align: center;">No Staff available</p>
                </div>

                <!-- Pagination Controls -->
                <div class="pagination" id="paginationControls" style="display: none;">
                    <button id="prevBtn" class="pagination-btn" disabled>Previous</button>
                    <span id="pageNumber"></span>
                    <button id="nextBtn" class="pagination-btn">Next</button>
                </div>
            </div>
        </div>
    </div>

    </div>

    <script>
        const currentPage = window.location.pathname.split("/").pop();
        const menuItems = document.querySelectorAll('.menu-item');

        menuItems.forEach(item => {
            if (item.getAttribute('href').includes(currentPage)) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    </script>
    <script src="adminStaff.js"></script>
</body>

</html>
